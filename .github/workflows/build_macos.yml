name: Build macOS .app

on:
  push:
    tags:
      - "v*"          # Déclenché sur les tags : v1.0.0, v1.1.0 …
  workflow_dispatch:   # Peut être lancé manuellement depuis GitHub

# Permission nécessaire pour créer des releases GitHub
permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS bundle
    runs-on: macos-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installer Python 3.12
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Installer les dépendances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "PySide6>=6.6.0" \
            "SQLAlchemy>=2.0.0" \
            "reportlab>=4.0.0" \
            "openpyxl>=3.1.0" \
            "matplotlib>=3.8.0" \
            "pyinstaller>=6.0.0"

      # 4. Compiler le .app avec PyInstaller
      - name: Build with PyInstaller
        run: |
          pyinstaller SalemService.spec --noconfirm

      # 5. Créer le fichier .dmg
      - name: Create DMG
        run: |
          hdiutil create \
            -volname "Salem Service" \
            -srcfolder "dist/SalemService.app" \
            -ov -format UDZO \
            "dist/SalemService.dmg"

      # 6. Uploader le DMG comme artefact téléchargeable
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: SalemService-macOS
          path: dist/SalemService.dmg
          retention-days: 30

      # 7. Créer une release GitHub avec le DMG attaché (uniquement sur tag)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SalemService.dmg
          name: "Salem Service ${{ github.ref_name }}"
          generate_release_notes: true
          body: |
            ## Salem Service ${{ github.ref_name }}

            ### 📥 Installation macOS
            1. Télécharger `SalemService.dmg` ci-dessous
            2. Double-cliquer pour monter le disque
            3. Glisser `SalemService.app` dans le dossier Applications
            4. Au premier lancement : **clic droit → Ouvrir** (sécurité macOS)
